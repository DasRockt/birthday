<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario´s 40iger Feier 🍺🍷🎉</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Arial Black', sans-serif;
  background: #000;
  color: #fff;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
  justify-content: center;   /* jetzt mittig */
  align-items: center;
  text-align: center;
  padding: 10px;
  box-sizing: border-box;
  min-height: 100vh;         /* volle Höhe für Zentrierung */
}

h1,h3,h4 {
  margin: 5px 0;
  text-shadow: 0 0 10px #ffcc00,0 0 20px #ff6600;
  z-index: 10;
}

h3,h4 { color: #ffcc00; }

.big40 {
  font-size: clamp(3rem, 10vw, 8rem);
  font-weight: bold;
  color: #ffcc00;
  text-shadow: 0 0 20px #ffcc00,0 0 40px #ff6600,0 0 60px #ff3300;
  animation: shimmer 3s infinite alternate;
  z-index: 10;
  margin-bottom: -5px;
}

@keyframes shimmer {
  from { filter: drop-shadow(0 0 10px gold) brightness(1); }
  to   { filter: drop-shadow(0 0 30px orange) brightness(1.3); }
}

#partyText {
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  margin-top: 5px;
  margin-bottom: 10px;
}

/* Buttons */
.button {
  font-size: 1.5rem;
  padding: 12px 30px; 
  border-radius: 20px;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 15px rgba(255,200,0,0.7);
  margin: 10px auto;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  width: 500px; /* feste Breite */
  max-width: 90%;
  text-align: center;
  line-height: 1.2;
  color: #fff;
  border: none;
  position: relative;
  z-index: 10;
}

#rsvpButton { background: #ffcc00; color:#000; }
#rsvpButton:hover { background: #ff9900; }

/* Getränke/Emojis */
.beer, .wine, .forty-sign, .adult-only {
  position: absolute;
  z-index: 1; 
  font-size: 3rem;
}

.beer, .wine { bottom: -50px; animation: floatUp 9s linear infinite; }
.forty-sign, .adult-only { top: -50px; animation: floatDown 11s linear infinite; }

.forty-sign {
  position: absolute;
  top: -50px;
  font-size: 2rem;
  color: #ffd700; /* goldiger Farbton */
  font-weight: bold;
  text-shadow: 
    0 0 10px #ffea00,
    0 0 20px #ffcc00,
    0 0 30px #ffaa00;
  animation: floatDown 11s linear infinite;
  z-index: 5;
}

@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(-120vh) rotate(360deg); opacity:0.5; }
}
@keyframes floatDown {
  0% { transform: translateY(-10vh) rotate(0deg); opacity:0.8; }
  100% { transform: translateY(120vh) rotate(360deg); opacity:0; }
}

.confetti {
  position: fixed;
  width: 6px;
  height: 6px;
  background-color: red;
  top: -10px;
  animation: fall 3s linear forwards;
  z-index: 30;
}
@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity:0; } }

.party-light {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.7;
  animation: moveLight 15s linear infinite, colorShift 8s ease-in-out infinite alternate;
  z-index:1;
}
@keyframes moveLight {
  0% { transform: translate(0,0) scale(1); }
  25% { transform: translate(20vw,-10vh) scale(1.2); }
  50% { transform: translate(-15vw,15vh) scale(0.8); }
  75% { transform: translate(10vw,-20vh) scale(1.3); }
  100% { transform: translate(0,0) scale(1); }
}
@keyframes colorShift {
  0% { background:#ff0044; }
  25% { background:#00ffcc; }
  50% { background:#ffcc00; }
  75% { background:#6600ff; }
  100% { background:#ff0044; }
}

/* Mobile Anpassung */
@media (max-width:480px) {
  .big40 { font-size: 15vw; }
  h3,h4,h1 { font-size:4vw; }
  .button { font-size:4vw; padding:8px 20px; width:90%; }
  .beer,.wine,.forty-sign,.adult-only { font-size:3rem; }
}
</style>
</head>
<body>

<!-- Hintergrundlichter -->
<div class="party-light" style="width:300px;height:300px;top:10%;left:15%;"></div>
<div class="party-light" style="width:400px;height:400px;top:50%;left:70%;"></div>
<div class="party-light" style="width:250px;height:250px;top:70%;left:20%;"></div>

<!-- Große 40 -->
<div class="big40">Mario</div>
<h1>wird</h1>
<div class="big40">40</div>
<h3 id="partyText">🍺🍷 lasst uns am 14.08.2026 gemeinsam anstoßen! 🍷🍺</h3>

<h1>🍻 Countdown zur Party 🍷</h1>
<button class="button" id="partycountdown">Lädt...</button>

<h1>🍷 save the date 🍻</h1>
<button class="button" id="addCalendar">📅 Zum Kalender hinzufügen</button>

<h1> </h1>

<h1> </h1>
<button class="button" id="rsvpButton">Bitte hier Zu oder Absagen</button>

<script>
// Countdown
const partyDate = new Date("August 14, 2026 17:00:00").getTime();
function updateCountdown(targetDate, id){
  const now = new Date().getTime();
  const distance = targetDate - now;
  if(distance<=0){document.getElementById(id).innerHTML="🍾 Die Party startet jetzt! 🎊"; return;}
  const d=Math.floor(distance/(1000*60*60*24));
  const h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((distance%(1000*60*60))/(1000*60));
  const s=Math.floor((distance%(1000*60))/1000);
  document.getElementById(id).innerHTML=`${d} Tage ${h} Std ${m} Min ${s} Sek`;
}
setInterval(()=>updateCountdown(partyDate,"partycountdown"),1000);

// Emojis
function createEmoji(cls,icon,durMin,durMax){
  const e=document.createElement("div");
  e.classList.add(cls);
  e.innerHTML=icon;
  e.style.left=Math.random()*100+"vw";
  e.style.animationDuration=(durMin+Math.random()*durMax)+"s";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),10000);
}
setInterval(()=>createEmoji("beer","🍺",5,5),1200);
setInterval(()=>createEmoji("wine","🍷",6,5),1200);
setInterval(()=>createEmoji("adult-only","🔞",6,4),1000);
setInterval(()=>createEmoji("forty-sign","40",6,4),1000);

// Kalender (.ics Datei)
document.getElementById('addCalendar').addEventListener('click',()=>{
  const icsContent = `BEGIN:VCALENDAR
VERSION:2.0
BEGIN:VEVENT
SUMMARY:Mario´s Geburtstagsparty 🎉
DESCRIPTION:Marios 40er Party! 🎉\\nBitte auch die Zu - Absage ausfüllen \\nDANKE \\n \\n \\n📱 Achtung bei iPhones unten \\n auf „Hinzufügen“ drücken
LOCATION:Bei mir Zuhause, Au 604, 3333 Biberbach
DTSTART:20260814T170000
DTEND:20260815T050000
BEGIN:VALARM
TRIGGER:-P14D
ACTION:DISPLAY
DESCRIPTION:Erinnerung: Mario´s Party in 2 Wochen 🎉
END:VALARM
BEGIN:VALARM
TRIGGER:-P7D
ACTION:DISPLAY
DESCRIPTION:Erinnerung: Mario´s Party in 1 Woche 🎉
END:VALARM
END:VEVENT
END:VCALENDAR`;

  const blob = new Blob([icsContent], { type: 'text/calendar' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mario40.ics';
  a.click();
  URL.revokeObjectURL(url);
});

// RSVP Button
document.getElementById('rsvpButton').addEventListener('click',()=>{
  window.location.href = 'zusage.html';
});
</script>
</body>
</html>
