<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario´s 40iger Feier 🍺🍷🎉</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Arial Black', sans-serif;
  background: #000;
  color: #ffcc00;

  /* FIX: kein echtes hidden mehr */
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Scrollbar verstecken */
body::-webkit-scrollbar {
  display: none;
}

body {
  display: flex;
  flex-direction: column;

  /* FIX: verhindert Springen */
  justify-content: flex-start;
  align-items: center;

  text-align: center;
  padding: 30px 10px 10px 10px;
  box-sizing: border-box;

  /* FIX: stabil bei iPhone Keyboard */
  min-height: 100dvh;
}

h1, h3 {
  margin: 5px 0;
  text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600;
  z-index: 10; 
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  background-color: #111;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 25px #ffcc00;
  width: 400px;
  max-width: 90%;
  z-index: 10;
}

input[type="text"] {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ffcc00;

  /* WICHTIG für iOS */
  font-size: 16px;

  font-family: 'Arial Black', sans-serif;
  background-color: black;
  color: #ffcc00;
}

.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.checkbox-group label {
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
}

input[type="checkbox"] {
  width: auto;
  margin-right: 10px;
  transform: scale(1.5);
  accent-color: gold;
  cursor: pointer;
}

button {
  background-color: #ffcc00;
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-family: 'Arial Black', sans-serif;
  z-index: 10; 
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

button:hover {
  background-color: #ff9900;
}

#backButton {
  margin-top: 20px;
  background: rgba(255, 204, 0, 0.6);
  color: black;
  width: 200px;
  z-index: 10;
}

/* Spinner */
.spinner {
  border: 4px solid rgba(0, 0, 0, 0.3); 
  border-top: 4px solid black; 
  border-radius: 50%;
  width: 22px; 
  height: 22px;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Party Elemente */
.beer, .wine, .forty-sign, .adult-only {
  position: absolute;
  z-index: 1; 
  font-size: 3rem;
}

.beer, .wine { bottom: -50px; }
.forty-sign, .adult-only { top: -50px; }

@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(-120vh) rotate(360deg); opacity:0.5; }
}
@keyframes floatDown {
  0% { transform: translateY(-10vh) rotate(0deg); opacity:0.8; }
  100% { transform: translateY(120vh) rotate(360deg); opacity:0; }
}

/* Party Lichter */
.party-light {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.7;
  animation: moveLight 15s linear infinite, colorShift 8s ease-in-out infinite alternate;
  z-index:1;
}

@keyframes moveLight {
  0% { transform: translate(0,0) scale(1); }
  50% { transform: translate(-15vw,15vh) scale(0.8); }
  100% { transform: translate(0,0) scale(1); }
}

@keyframes colorShift {
  0% { background:#ff0044; }
  50% { background:#ffcc00; }
  100% { background:#ff0044; }
}

/* Alert */
#customAlert {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:9999;
  justify-content:center;
  align-items:center;
}

#customAlert div {
  background:#111;
  color:#ffcc00;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
  box-shadow:0 0 15px #ffcc00;
}
</style>
</head>

<body>

<h1>🎉 Mario´s 40iger Feier 🎉</h1>
<h3>Bitte trage hier deine Zu- oder Absage ein</h3>

<form id="rsvpForm">
  <label for="vorname">Vorname:<span style="color:red">*</span></label>
  <input type="text" id="vorname" required>

  <label for="nachname">Nachname:<span style="color:red">*</span></label>
  <input type="text" id="nachname" required>

  <div class="checkbox-group">
    <label><input type="checkbox" id="jaCheckbox"> Ja, ich bin dabei</label>
    <label><input type="checkbox" id="neinCheckbox"> Ich kann leider nicht kommen</label>
  </div>

  <button type="submit"><span class="spinner"></span>Absenden</button>
</form>

<button id="backButton" onclick="window.location.href='index.html'">zurück</button>

<!-- Party Lichter -->
<div class="party-light" style="width:300px;height:300px;top:10%;left:15%;"></div>
<div class="party-light" style="width:400px;height:400px;top:50%;left:70%;"></div>
<div class="party-light" style="width:250px;height:250px;top:70%;left:20%;"></div>

<!-- Alert -->
<div id="customAlert">
  <div>
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyVMyZi3ApQglIALSslN8odzkgVo40gi2oGlBd7lOPA2m6sEO8qhrFb_N2fiSFcV2gR/exec";

const jaCheckbox = document.getElementById("jaCheckbox");
const neinCheckbox = document.getElementById("neinCheckbox");

jaCheckbox.addEventListener("change", () => { if(jaCheckbox.checked) neinCheckbox.checked = false; });
neinCheckbox.addEventListener("change", () => { if(neinCheckbox.checked) jaCheckbox.checked = false; });

function showAlert(text){
  document.getElementById('alertText').innerText = text;
  document.getElementById('customAlert').style.display = 'flex';
}
function closeAlert(){
  document.getElementById('customAlert').style.display = 'none';
}

/* ✅ Animation pausieren beim Tippen */
let isTyping = false;

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("focus", () => isTyping = true);
  input.addEventListener("blur", () => isTyping = false);
});

/* Emojis */
function createEmoji(cls, icon){
  if(isTyping) return;

  const e = document.createElement("div");
  e.classList.add(cls);
  e.innerHTML = icon;
  e.style.left = Math.random()*100 + "vw";
  e.style.fontSize = (2 + Math.random()*2) + "rem";
  e.style.opacity = 0.5 + Math.random()*0.5;

  const duration = 6 + Math.random()*5;
  e.style.animation = (cls.includes("beer") || cls.includes("wine") ? "floatUp" : "floatDown") + ` ${duration}s linear forwards`;
  e.style.transform = `rotate(${Math.random()*360}deg)`;

  document.body.appendChild(e);
  setTimeout(()=> e.remove(), duration*1000);
}

setInterval(()=>createEmoji("beer","🍺"),1200);
setInterval(()=>createEmoji("wine","🍷"),1200);
setInterval(()=>createEmoji("adult-only","🔞"),1000);
setInterval(()=>createEmoji("forty-sign","40"),1000);
</script>

</body>
</html>
