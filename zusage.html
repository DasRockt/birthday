<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario´s 40iger Feier 🍺🍷🎉</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Arial Black', sans-serif;
  background: #000;
  color: #ffcc00;
  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
body::-webkit-scrollbar { display:none; }

/* Wrapper für stabile Zentrierung */
.wrapper {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  transition: transform 0.25s ease;
}
.wrapper.typing {
  transform: translateY(-10%);
}

.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

h1, h3 {
  margin: 5px 0;
  text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600;
  z-index: 10;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  background:#111;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 25px #ffcc00;
  width:400px;
  max-width:90%;
  z-index:10;
}

input[type="text"] {
  padding:12px;
  border-radius:10px;
  border:1px solid #ffcc00;
  font-size:16px;
  background:black;
  color:#ffcc00;
}

.checkbox-group { display:flex; flex-direction:column; gap:15px; }

.checkbox-group label {
  font-size:18px;
  display:flex;
  align-items:center;
}

input[type="checkbox"] {
  margin-right:10px;
  transform:scale(1.5);
  accent-color:gold;
}

button {
  background:#ffcc00;
  color:black;
  font-weight:bold;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#backButton {
  margin-top:15px;
  background:rgba(255,204,0,0.6);
  width:200px;
}

/* Spinner */
.spinner {
  border:4px solid rgba(0,0,0,0.3);
  border-top:4px solid black;
  border-radius:50%;
  width:22px;
  height:22px;
  animation:spin 1s linear infinite;
  display:none;
}
@keyframes spin { 100%{transform:rotate(360deg);} }

/* Emojis */
.beer,.wine,.adult-only,.forty-sign {
  position:absolute;
  z-index:1;
  font-size:3rem;
}
.beer,.wine { bottom:-50px; }
.adult-only,.forty-sign { top:-50px; }

.forty-sign {
  font-size:2rem;
  font-weight:bold;
  color:#ffd700;
}

@keyframes floatUp {
  100% { transform:translateY(-120vh) rotate(360deg); opacity:0.5; }
}
@keyframes floatDown {
  100% { transform:translateY(120vh) rotate(360deg); opacity:0; }
}

/* Party Lichter */
.party-light {
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.7;
  animation:moveLight 15s linear infinite;
}
@keyframes moveLight {
  50% { transform:translate(-15vw,15vh) scale(0.8); }
}

/* Alert */
#customAlert {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:9999;
  justify-content:center;
  align-items:center;
}
#customAlert div {
  background:#111;
  color:#ffcc00;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
}
</style>
</head>

<body>

<div class="wrapper" id="wrapper">
<div class="content">

<h1>🎉 Mario´s 40iger Feier 🎉</h1>
<h3>Bitte trage hier deine Zu- oder Absage ein</h3>

<form id="rsvpForm">
  <input type="text" id="vorname" placeholder="Vorname" required>
  <input type="text" id="nachname" placeholder="Nachname" required>

  <div class="checkbox-group">
    <label><input type="checkbox" id="jaCheckbox"> Ja, ich bin dabei</label>
    <label><input type="checkbox" id="neinCheckbox"> Ich kann leider nicht kommen</label>
  </div>

  <button type="submit"><span class="spinner"></span>Absenden</button>
</form>

<button id="backButton" onclick="window.location.href='index.html'">zurück</button>

</div>
</div>

<!-- Party Lichter -->
<div class="party-light" style="width:300px;height:300px;top:10%;left:15%;"></div>
<div class="party-light" style="width:400px;height:400px;top:50%;left:70%;"></div>
<div class="party-light" style="width:250px;height:250px;top:70%;left:20%;"></div>

<!-- Alert -->
<div id="customAlert">
  <div>
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>

<script>
const wrapper = document.getElementById("wrapper");

/* Typing Status */
let isTyping = false;

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("focus", () => {
    isTyping = true;
    wrapper.classList.add("typing");
  });
  input.addEventListener("blur", () => {
    isTyping = false;
    wrapper.classList.remove("typing");
  });
});

/* Emojis */
function createEmoji(cls, icon){
  if(isTyping) return;

  const e = document.createElement("div");
  e.classList.add(cls);
  e.innerHTML = icon;
  e.style.left = Math.random()*100 + "vw";
  e.style.fontSize = (2 + Math.random()*2) + "rem";

  const duration = 6 + Math.random()*5;
  e.style.animation =
    (cls === "beer" || cls === "wine" ? "floatUp" : "floatDown") +
    ` ${duration}s linear forwards`;

  document.body.appendChild(e);
  setTimeout(()=> e.remove(), duration*1000);
}

/* ALLE Emojis wieder aktiv */
setInterval(()=>createEmoji("beer","🍺"),1200);
setInterval(()=>createEmoji("wine","🍷"),1200);
setInterval(()=>createEmoji("adult-only","🔞"),1000);
setInterval(()=>createEmoji("forty-sign","40"),1000);
</script>

</body>
</html>
