<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario´s 40iger Feier 🍺🍷🎉</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Arial Black', sans-serif;
  background: #000;
  color: #ffcc00;

  overflow-x: hidden;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
body::-webkit-scrollbar { display:none; }

/* stabile Zentrierung */
.wrapper {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
}

.content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

h1, h3 {
  margin: 5px 0;
  text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600;
  z-index: 10;
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  background:#111;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 25px #ffcc00;
  width:400px;
  max-width:90%;
  z-index:10;
}

input[type="text"] {
  padding:12px;
  border-radius:10px;
  border:1px solid #ffcc00;
  font-size:16px;
  background:black;
  color:#ffcc00;
}

.checkbox-group {
  display:flex;
  flex-direction:column;
  gap:15px;
}

.checkbox-group label {
  font-size:18px;
  display:flex;
  align-items:center;
}

input[type="checkbox"] {
  margin-right:10px;
  transform:scale(1.5);
  accent-color:gold;
}

button {
  background:#ffcc00;
  color:black;
  font-weight:bold;
  padding:12px;
  border-radius:10px;
  border:none;
  font-size:16px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

#backButton {
  margin-top:15px;
  background:rgba(255,204,0,0.6);
  width:200px;
}

/* Spinner */
.spinner {
  border:4px solid rgba(0,0,0,0.3);
  border-top:4px solid black;
  border-radius:50%;
  width:22px;
  height:22px;
  animation:spin 1s linear infinite;
  display:none;
}
@keyframes spin { 100%{transform:rotate(360deg);} }

/* Emojis */
.beer,.wine,.adult-only,.forty-sign {
  position:absolute;
  z-index:1;
  font-size:3rem;
}
.beer,.wine { bottom:-50px; }
.adult-only,.forty-sign { top:-50px; }

.forty-sign {
  font-size:2rem;
  font-weight:bold;
  color:#ffd700;
}

@keyframes floatUp {
  100% { transform:translateY(-120vh) rotate(360deg); opacity:0.5; }
}
@keyframes floatDown {
  100% { transform:translateY(120vh) rotate(360deg); opacity:0; }
}

/* Party Licht */
.party-light {
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.7;
  animation:moveLight 15s linear infinite;
}
@keyframes moveLight {
  50% { transform:translate(-15vw,15vh) scale(0.8); }
}

/* Popup */
#customAlert {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  z-index:9999;
  justify-content:center;
  align-items:center;
}
#customAlert div {
  background:#111;
  color:#ffcc00;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
  box-shadow:0 0 15px #ffcc00;
}
#customAlert button {
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="content">

<h1>🎉 Mario´s 40iger Feier 🎉</h1>
<h3>Bitte trage hier deine Zu- oder Absage ein</h3>

<form id="rsvpForm">
  <input type="text" id="vorname" placeholder="Vorname" required>
  <input type="text" id="nachname" placeholder="Nachname" required>

  <div class="checkbox-group">
    <label><input type="checkbox" id="jaCheckbox"> Ja, ich bin dabei</label>
    <label><input type="checkbox" id="neinCheckbox"> Ich kann leider nicht kommen</label>
  </div>

  <button type="submit" id="submitBtn">
    <span class="spinner"></span>
    Absenden
  </button>
</form>

<button id="backButton" onclick="window.location.href='index.html'">zurück</button>

</div>
</div>

<!-- Party Lichter -->
<div class="party-light" style="width:300px;height:300px;top:10%;left:15%;"></div>
<div class="party-light" style="width:400px;height:400px;top:50%;left:70%;"></div>
<div class="party-light" style="width:250px;height:250px;top:70%;left:20%;"></div>

<!-- Popup -->
<div id="customAlert">
  <div>
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyVMyZi3ApQglIALSslN8odzkgVo40gi2oGlBd7lOPA2m6sEO8qhrFb_N2fiSFcV2gR/exec";

const form = document.getElementById("rsvpForm");
const submitBtn = document.getElementById("submitBtn");

const jaCheckbox = document.getElementById("jaCheckbox");
const neinCheckbox = document.getElementById("neinCheckbox");

/* Checkbox Logik */
jaCheckbox.addEventListener("change", () => { if(jaCheckbox.checked) neinCheckbox.checked = false; });
neinCheckbox.addEventListener("change", () => { if(neinCheckbox.checked) jaCheckbox.checked = false; });

/* Popup */
function showAlert(text){
  document.getElementById('alertText').innerText = text;
  document.getElementById('customAlert').style.display = 'flex';
}
function closeAlert(){
  document.getElementById('customAlert').style.display = 'none';
}

/* FORMULAR (FIXED + RELIABLE) */
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();

  if(!vorname || !nachname){
    showAlert("Bitte Vor- und Nachname ausfüllen!");
    return;
  }

  let antwort = "";
  if(jaCheckbox.checked) antwort = "ja";
  else if(neinCheckbox.checked) antwort = "nein";
  else {
    showAlert("Bitte Ja oder Nein auswählen!");
    return;
  }

  const data = { vorname, nachname, antwort };

  const spinner = submitBtn.querySelector(".spinner");
  spinner.style.display = "inline-block";
  submitBtn.disabled = true;

  try {
    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await res.json();

    if(result.status === "ok"){
      showAlert("🎉 Danke für deine Antwort! 🎉");

      form.reset();

      document.querySelector("#customAlert button").onclick = () => {
        window.location.href = "index.html";
      };

    } else if(result.status === "exists"){
      showAlert("Du hast schon abgestimmt. Für Änderungen melde dich bitte bei Mario.");
      document.querySelector("#customAlert button").onclick = closeAlert;

    } else {
      showAlert("Fehler beim Absenden, bitte erneut versuchen.");
      document.querySelector("#customAlert button").onclick = closeAlert;
    }

  } catch (err) {
    console.error(err);
    showAlert("Netzwerkfehler – bitte Verbindung prüfen.");
    document.querySelector("#customAlert button").onclick = closeAlert;
  }

  spinner.style.display = "none";
  submitBtn.disabled = false;
});

/* Emojis */
function createEmoji(cls, icon){
  const e = document.createElement("div");
  e.classList.add(cls);
  e.innerHTML = icon;
  e.style.left = Math.random()*100 + "vw";

  const duration = 6 + Math.random()*5;
  e.style.animation =
    (cls === "beer" || cls === "wine" ? "floatUp" : "floatDown")
    + ` ${duration}s linear forwards`;

  document.body.appendChild(e);
  setTimeout(()=> e.remove(), duration*1000);
}

setInterval(()=>createEmoji("beer","🍺"),1200);
setInterval(()=>createEmoji("wine","🍷"),1200);
setInterval(()=>createEmoji("adult-only","🔞"),1000);
setInterval(()=>createEmoji("forty-sign","40"),1000);
</script>

</body>
</html>
