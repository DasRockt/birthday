<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario´s 40iger Feier 🍺🍷🎉</title>
<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Arial Black', sans-serif;
  background: #000;
  color: #ffcc00;
  overflow-x: hidden;
  overflow-y: auto;
}

body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 10px;
  box-sizing: border-box;
  min-height: 100dvh;
}

h1, h3 {
  margin: 5px 0;
  text-shadow: 0 0 10px #ffcc00, 0 0 20px #ff6600;
  z-index: 10; 
}

form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  background-color: #111;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 0 25px #ffcc00;
  width: 400px;
  max-width: 90%;
  z-index: 10;
}

input[type="text"] {
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ffcc00;
  font-size: 16px;
  font-family: 'Arial Black', sans-serif;
  background-color: black;
  color: #ffcc00;
}

.checkbox-group {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.checkbox-group label {
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
}

input[type="checkbox"] {
  width: auto;
  margin-right: 10px;
  transform: scale(1.5);
  accent-color: gold;
  cursor: pointer;
}

button {
  background-color: #ffcc00;
  color: black;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
  font-family: 'Arial Black', sans-serif;
  z-index: 10; 
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

button:hover {
  background-color: #ff9900;
}

#backButton {
  margin-top: 20px;
  background: rgba(255, 204, 0, 0.6);
  color: black;
  width: 200px;
  z-index: 10;
}

@media (max-width:480px) {
  form { width: 90%; }
  input[type="text"], button { font-size: 4vw; padding: 10px; }
}

/* Lade-Spinner */
.spinner {
  border: 4px solid rgba(0, 0, 0, 0.3); 
  border-top: 4px solid black; 
  border-radius: 50%;
  width: 22px; 
  height: 22px;
  animation: spin 1s linear infinite;
  display: none;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Animierte Party-Elemente */
.beer, .wine, .forty-sign, .adult-only {
  position: absolute;
  z-index: 1; 
  font-size: 3rem;
}

.beer, .wine { bottom: -50px; }
.forty-sign, .adult-only { top: -50px; }

.forty-sign {
  font-size: 2rem;
  color: #ffd700; 
  font-weight: bold;
  text-shadow: 0 0 10px #ffea00, 0 0 20px #ffcc00, 0 0 30px #ffaa00;
  z-index: 1;
}

@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(-120vh) rotate(360deg); opacity:0.5; }
}
@keyframes floatDown {
  0% { transform: translateY(-10vh) rotate(0deg); opacity:0.8; }
  100% { transform: translateY(120vh) rotate(360deg); opacity:0; }
}

.confetti {
  position: fixed;
  width: 6px;
  height: 6px;
  background-color: red;
  top: -10px;
  animation: fall 3s linear forwards;
  z-index: 1;
}
@keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity:0; } }

.party-light {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.7;
  animation: moveLight 15s linear infinite, colorShift 8s ease-in-out infinite alternate;
  z-index:1;
}
@keyframes moveLight {
  0% { transform: translate(0,0) scale(1); }
  25% { transform: translate(20vw,-10vh) scale(1.2); }
  50% { transform: translate(-15vw,15vh) scale(0.8); }
  75% { transform: translate(10vw,-20vh) scale(1.3); }
  100% { transform: translate(0,0) scale(1); }
}
@keyframes colorShift {
  0% { background:#ff0044; }
  25% { background:#00ffcc; }
  50% { background:#ffcc00; }
  75% { background:#6600ff; }
  100% { background:#ff0044; }
}

/* Custom Alert */
#customAlert {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:9999;
  justify-content:center;
  align-items:center;
}
#customAlert div {
  background:#111;
  color:#ffcc00;
  padding:20px;
  border-radius:10px;
  width:300px;
  text-align:center;
  box-shadow:0 0 15px #ffcc00;
}
#customAlert h2 {
  margin:0 0 15px 0;
}
#customAlert button {
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🎉 Mario´s 40iger Feier 🎉</h1>
<h3>Bitte trage hier deine Zu- oder Absage ein</h3>

<form id="rsvpForm">
  <label for="vorname">Vorname:<span style="color:red">*</span></label>
  <input type="text" id="vorname" name="vorname" required>

  <label for="nachname">Nachname:<span style="color:red">*</span></label>
  <input type="text" id="nachname" name="nachname" required>

  <div class="checkbox-group">
    <label><input type="checkbox" name="antwort" value="ja" id="jaCheckbox"> Ja, ich bin dabei</label>
    <label><input type="checkbox" name="antwort" value="nein" id="neinCheckbox"> Ich kann leider nicht kommen</label>
  </div>

  <button type="submit"><span class="spinner"></span>Absenden</button>
</form>
<h3> </h3>
<h3> </h3>
<button id="backButton" onclick="window.location.href='index.html'">zurück</button>

<!-- Party-Lichter -->
<div class="party-light" style="width:300px;height:300px;top:10%;left:15%;"></div>
<div class="party-light" style="width:400px;height:400px;top:50%;left:70%;"></div>
<div class="party-light" style="width:250px;height:250px;top:70%;left:20%;"></div>

<!-- Custom Alert -->
<div id="customAlert">
  <div>
    <!-- <h2>Marios Seite</h2>-->
    <p id="alertText"></p>
    <button onclick="closeAlert()">OK</button>
  </div>
</div>

<script>
// Web-App URL aus Google Apps Script hier einfügen:
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyVMyZi3ApQglIALSslN8odzkgVo40gi2oGlBd7lOPA2m6sEO8qhrFb_N2fiSFcV2gR/exec";

// Checkbox nur eine wählbar
const jaCheckbox = document.getElementById("jaCheckbox");
const neinCheckbox = document.getElementById("neinCheckbox");
jaCheckbox.addEventListener("change", () => { if(jaCheckbox.checked) neinCheckbox.checked = false; });
neinCheckbox.addEventListener("change", () => { if(neinCheckbox.checked) jaCheckbox.checked = false; });

// Custom Alert Funktionen
function showAlert(text){
  document.getElementById('alertText').innerText = text;
  document.getElementById('customAlert').style.display = 'flex';
}
function closeAlert(){
  document.getElementById('customAlert').style.display = 'none';
}

// Formular absenden
document.getElementById("rsvpForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const vorname = document.getElementById("vorname").value.trim();
  const nachname = document.getElementById("nachname").value.trim();
  if(!vorname || !nachname) {
    showAlert("Bitte Vor- und Nachname ausfüllen!");
    return;
  }

  let antwort = "";
  if(jaCheckbox.checked) antwort = "ja";
  else if(neinCheckbox.checked) antwort = "nein";
  else {
    showAlert("Bitte wähle Ja oder Nein!");
    return;
  }

  const data = { vorname, nachname, antwort };

  // Ladeanzeige aktivieren
  const submitButton = e.target.querySelector("button[type='submit']");
  const spinner = submitButton.querySelector(".spinner");
  spinner.style.display = "inline-block";
  submitButton.disabled = true;

  try {
    const response = await fetch(WEB_APP_URL, {
      method: "POST",
      body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.status === "ok") {
      showAlert("🎉 Danke für deine Antwort! 🎉 Wir freuen uns schon auf dein Kommen!");
      document.getElementById("rsvpForm").reset();
      document.querySelector("#customAlert button").onclick = () => { window.location.href = "index.html"; };
    } else if(result.status === "exists") {
      showAlert("Du hast schon abgestimmt. Für Änderungen melde dich bitte bei Mario.");
      spinner.style.display = "none";
      submitButton.disabled = false;
      document.querySelector("#customAlert button").onclick = closeAlert;
    } else {
      showAlert("Fehler beim Absenden, bitte versuche es erneut.");
      spinner.style.display = "none";
      submitButton.disabled = false;
      document.querySelector("#customAlert button").onclick = closeAlert;
    }
  } catch (err) {
    showAlert("Fehler beim Absenden, bitte überprüfe deine Internetverbindung.");
    console.error(err);
    spinner.style.display = "none";
    submitButton.disabled = false;
    document.querySelector("#customAlert button").onclick = closeAlert;
  }
});

// Emojis wie auf Index – lebendig
function createEmoji(cls, icon){
  const e = document.createElement("div");
  e.classList.add(cls);
  e.innerHTML = icon;
  e.style.left = Math.random()*100 + "vw";
  e.style.fontSize = (2 + Math.random()*2) + "rem";
  e.style.opacity = 0.5 + Math.random()*0.5;
  const duration = 6 + Math.random()*5;
  e.style.animation = (cls.includes("beer") || cls.includes("wine") ? "floatUp" : "floatDown") + ` ${duration}s linear forwards`;
  e.style.transform = `rotate(${Math.random()*360}deg)`;
  document.body.appendChild(e);
  setTimeout(()=> e.remove(), duration*1000);
}

// Intervalle wie auf Index
setInterval(()=>createEmoji("beer","🍺"),1200);
setInterval(()=>createEmoji("wine","🍷"),1200);
setInterval(()=>createEmoji("adult-only","🔞"),1000);
setInterval(()=>createEmoji("forty-sign","40"),1000);
</script>
</body>
</html>
